name: Box Doc => Code Generator

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 平日の朝9時（UTC）に自動実行
  workflow_dispatch:          # 手動でも実行できるようにする
    inputs:
      file_id:
        description: 'BoxファイルID（特定ファイルを指定する場合）'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch updated docs from Box
        env:
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          BOX_ENTERPRISE_ID: ${{ secrets.BOX_ENTERPRISE_ID }}
          BOX_PRIVATE_KEY: ${{ secrets.BOX_PRIVATE_KEY }}
          BOX_KEY_ID: ${{ secrets.BOX_KEY_ID }}
          BOX_WATCH_FOLDER_ID: ${{ secrets.BOX_WATCH_FOLDER_ID }}
          FILE_ID: ${{ github.event.inputs.file_id }}
        run: python scripts/fetch_box_doc.py

      - name: Generate code with Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_code.py

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: '[AI生成] ${{ env.DOC_NAME }}'
          title: '[AI生成] ${{ env.DOC_NAME }}'
          body-path: pr_body.txt
          branch: 'ai-generated/${{ env.SAFE_DOC_NAME }}-${{ github.run_number }}'
          draft: true
          labels: 'ai-generated'

      - name: Notify Box
        if: steps.pr.outputs.pull-request-number != ''
        env:
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          BOX_ENTERPRISE_ID: ${{ secrets.BOX_ENTERPRISE_ID }}
          BOX_PRIVATE_KEY: ${{ secrets.BOX_PRIVATE_KEY }}
          BOX_KEY_ID: ${{ secrets.BOX_KEY_ID }}
          BOX_NOTIFY_FOLDER_ID: ${{ secrets.BOX_NOTIFY_FOLDER_ID }}
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
        run: python scripts/notify_box.py
